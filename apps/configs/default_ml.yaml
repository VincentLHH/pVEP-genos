# ============================================================
# ML应用配置示例
# ============================================================

# 数据源配置
data:
  # 目录结构：
  # emb_dir/
  #   ├── sample1/embeddings.json
  #   ├── sample2/embeddings.json
  #   └── ...
  emb_dir: "/path/to/embeddings"
  
  # 代谢组数据（CSV，每行一个样本，每列一个代谢物）
  metab_file: "/path/to/metabolomics.csv"
  
  # 表型组数据（CSV，每行一个样本，每列一个表型）
  pheno_file: "/path/to/phenotypes.csv"
  
  # 分类标签（CSV，sample_id, label）
  label_file: "/path/to/labels.csv"
  
  # 列名
  sample_id_col: "sample_id"
  label_col: "label"

  # -- 变异评分与 top-k 选择 --
  # 评分策略：
  #   relative : 背景校正 (cos_sim(diff_hap, diff_ref) 取反)
  #   absolute : 绝对效应 (||diff_hap1|| + ||diff_hap2||)
  #   weighted : relative + absolute 加权
  #   cascade  : 先用 absolute 粗筛 λk，再用 relative 精选 k
  variant_scoring: "absolute"

  # 每个样本选取的 top-k 变异数（0 = 不选，全量聚合）
  top_k: 0

  # 策略 weighted 的权重：score = w * norm(relative) + (1-w) * norm(absolute)
  score_weight: 0.5

  # 策略 cascade 的粗筛倍数 λ
  cascade_lambda: 2.0

  # top-k 变异 embedding 聚合：mean / max
  emb_aggregation: "mean"

  # 单个变异的 embedding 表示策略：
  #   mut_hap1:             仅 Mut_hap1
  #   mut_hap2:             仅 Mut_hap2
  #   mut_hap1_hap2_mean:   (Mut_hap1 + Mut_hap2) / 2
  #   mut_hap1_hap2_concat: concat(Mut_hap1, Mut_hap2)  注意：维度翻倍
  #   mut_mean_minus_wt_ref: (Mut_hap1+Mut_hap2)/2 - WT_ref
  #   mut_concat_minus_wt_ref: concat(Mut_hap1-WT_ref, Mut_hap2-WT_ref)  注意：维度翻倍
  emb_representation: "mut_hap1"

# 预处理配置（防止数据泄露的关键）
preprocess:
  enabled: true

  # ========== 基因组embedding降维 ==========
  # 降维策略：pca / none
  emb_reducer: "pca"
  # PCA目标维度："auto" -> min(n_samples, n_features)
  # 或指定整数如 128, 256
  emb_n_components: "auto"
  # 降维前是否先标准化
  emb_standardize_first: true

  # ========== 表格数据填补 ==========
  # 填补策略：median / mean / most_frequent / zero
  tab_impute_strategy: "median"

# 交叉验证
cv:
  n_folds: 5
  stratified: true
  shuffle: true
  random_state: 42

# 超参搜索空间
hyperparam:
  svm:
    C: [0.001, 0.01, 0.1, 1.0, 10.0]
    kernel: [linear, rbf]
    gamma: [scale, auto]
  
  logistic_regression:
    C: [0.01, 0.1, 1.0, 10.0]
    l1_ratio: [0, 1]
    solver: [liblinear]
    max_iter: [1000]
  
  xgboost:
    n_estimators: [50, 100, 200]
    max_depth: [3, 5, 7]
    learning_rate: [0.01, 0.1]
    subsample: [0.8, 1.0]
    colsample_bytree: [0.8, 1.0]
  
  mlp:
    hidden_layer_sizes: [[8], [16], [32], [16, 8]]
    activation: [relu, tanh]
    alpha: [0.001, 0.01, 0.1, 1.0]
    max_iter: [2000]
    early_stopping: [true]
    validation_fraction: [0.2]
    n_iter_no_change: [20]

# 消融实验
ablation:
  # 可选模态组合：
  # - genome_only:     只有基因组embedding
  # - metab_only:      只有代谢组
  # - pheno_only:      只有表型组
  # - genome+metab:    基因组 + 代谢组
  # - genome+pheno:    基因组 + 表型组
  # - metab+pheno:     代谢组 + 表型组
  # - all:             全部模态
  modules:
    - genome_only
    - genome+metab
    - genome+pheno
    - all
  
  save_dir: "outputs/ablation"

# 输出
output:
  save_dir: "outputs/ml"
  save_best_params: true
  save_predictions: true
  save_feature_importance: true
  verbose: 1

# 全局
random_state: 42
n_jobs: -1
