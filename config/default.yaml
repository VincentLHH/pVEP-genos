vcf_path: /home/share/huadjyin/home/liuhaohan/genos/vcfs/Final_sig_snps_32k_window_400.vcf.gz
bed_path: /home/share/huadjyin/home/liuhaohan/genos/test-emb/GWAS_TPMI_4045.bed
ref_fasta: /home/share/huadjyin/home/liuhaohan/Ref/hg38/hg38.fa

output_dir: outputs

# -------------------------------------------------------
# 序列构建器
# -------------------------------------------------------
seq_builder:
  # 构建器类型：builtin = 项目内置 Python 实现，genvarloader = GenVarLoader C扩展
  type: builtin

  # ── GenVarLoader 专用配置 ──
  # .gvl 数据集缓存目录（不填则默认 /tmp/gvl_cache）
  gvl_cache_dir: ""
  # 是否对负链区域做 reverse complement
  # 注意：新版 embedding 提取逻辑手动控制链方向，建议设为 false
  gvl_strandaware: false
  # gvl.write 内存上限（默认 '4g'）
  gvl_max_mem: "4g"

# -------------------------------------------------------
# BED 拆分参数
# -------------------------------------------------------
bed_split:
  # BED 输入模式：
  #   "auto"     : 程序内部自动拆分（从原始 bed 生成 upstream/downstream 双行）
  #   "presplit" : 输入 BED 已完成拆分（第四列以 _upstream/_downstream 结尾）
  mode: auto

  # 侧翼扩展长度 n（bp）：
  #   n 定义了 BED 行中变异位点单侧的侧翼上下文长度。
  #   上游行长度 = n + len(ref) + 1 bp（n bp 上游 + 变异区域 + 1 bp 下游）
  #   下游行长度 = n + len(ref) + 1 bp（1 bp 上游 + 变异区域 + n bp 下游）
  #   必须满足 n >= window_size // 2 + max(len(alt), len(ref)) + 2
  n: 200

# -------------------------------------------------------
# 模型配置
# -------------------------------------------------------
model:
  name: Genos-1.2B
  path: /home/share/huadjyin/home/liuhaohan/genos/Genos-1.2B
  dtype: bfloat16

  # GPU 推理批次大小（每次前向传播处理的序列条数）
  # 增大可提升 GPU 利用率，但需更多显存
  batch_size: 32

  # ── 推理模式 ──
  # local : 本机 GPU 推理（默认）
  # api   : 通过 HTTP 调用远程推理服务
  mode: local

  # API 推理时必填：远程服务地址
  api_base_url: ""

  # ── 设备配置 ──
  # 单卡：device 指定设备名；多卡：devices 列表（round-robin 分配样本）
  devices: []
  device: cuda

# 每个方向（upstream/downstream）送入模型的序列长度（bp）
# 决定了模型推理时能看到的上下文范围，需与 n 配合：
#   n >= window_size // 2 + max(len(alt), len(ref)) + 2
window_size: 128

# -------------------------------------------------------
# Embedding 提取配置（新版个性化 VEP）
# -------------------------------------------------------
embedding:
  # Tail pooling 方法：mean（默认）或 max
  pooling: mean

  # context_window：保留参数，暂不使用（当前 w = var_len + 2，固定计算）
  context_window: null

  # 定期保存间隔（每处理多少个 variant 保存一次）
  save_interval: 50

  # 输出格式：json（默认，文本格式）、npz（压缩二进制，推荐）、hdf5（.h5，支持增量写入）
  output_format: json

  # 是否在输出中保存重建的单倍型序列（可能较大）
  save_haplotypes: true

  # 是否执行模型推理（false 时仅构建序列，不运行模型，不产生 embedding）
  do_inference: true

  # 是否将 embedding 结果保存到磁盘
  # 注意：do_inference=false 时此选项无效（无结果可保存）
  # 若只需在内存中使用 embedding（如直接传入下游训练），可设为 false
  save_embeddings: true

  # 是否过滤基因型为 0|0 的变异
  #   true  : 过滤 0|0（默认，减少计算量，但不同样本变异数可能不同）
  #   false : 保留 0|0（确保所有样本变异数一致，便于下游训练对齐）
  filter_hom_ref: true

  # 全局 embedding 缓存策略：
  #   true  : 开启全局缓存（相同序列跨样本/跨变异共享，节省重复推理）
  #   false : 关闭全局缓存，但同一变异内部的等价序列（如 0|0 时 Mut==WT）
  #           及 WT_ref/Mut_ref 的上下行共享仍会去重，避免冗余推理
  use_global_cache: true

  # 跨变异批量推理的积累大小（每次积累多少个 variant 的序列后统一推理）
  # 配合 model.batch_size 使用：variant_batch_size=16 且每个 variant 约 8 条唯一序列
  # → 每次推理约 128 条序列，可充分利用 batch_size=32 的 GPU 并行能力
  variant_batch_size: 16
